<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="27" cy="523" r="72" fill="#1a1a2e" opacity="0.07"/>
    <circle cx="236" cy="-97" r="74" fill="#1a1a2e" opacity="0.06"/>
    <circle cx="1258" cy="-70" r="55" fill="#1a1a2e" opacity="0.10"/>
    <circle cx="388" cy="405" r="35" fill="#1a1a2e" opacity="0.09"/>
    <circle cx="245" cy="63" r="88" fill="#1a1a2e" opacity="0.18"/>
    <circle cx="304" cy="-24" r="29" fill="#1a1a2e" opacity="0.08"/>
    <rect x="335" y="341" width="34" height="39" rx="8" fill="#0a0a0a" opacity="0.04" transform="rotate(38, 1286, 47)"/>
    <rect x="680" y="136" width="39" height="61" rx="8" fill="#0a0a0a" opacity="0.14" transform="rotate(26, 492, 365)"/>
    <rect x="405" y="566" width="84" height="87" rx="8" fill="#0a0a0a" opacity="0.05" transform="rotate(33, 783, 346)"/>
    <rect x="227" y="-23" width="34" height="52" rx="8" fill="#0a0a0a" opacity="0.14" transform="rotate(8, 1251, -57)"/>
    <rect x="1014" y="145" width="32" height="64" rx="8" fill="#0a0a0a" opacity="0.04" transform="rotate(38, 1039, 386)"/>
    <rect x="546" y="341" width="95" height="25" rx="8" fill="#0a0a0a" opacity="0.11" transform="rotate(22, 318, 450)"/>
    <rect x="328" y="365" width="36" height="44" rx="8" fill="#0a0a0a" opacity="0.15" transform="rotate(16, 1092, 728)"/>
    <rect x="440" y="576" width="60" height="93" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(5, 665, 270)"/>
    <polygon points="386,621 449,747 323,747" fill="#1a1a2e" opacity="0.11"/>
    <polygon points="114,312 135,354 93,354" fill="#1a1a2e" opacity="0.07"/>
    <polygon points="-2,85 82,253 -86,253" fill="#1a1a2e" opacity="0.09"/>
    <polygon points="696,661 717,703 675,703" fill="#1a1a2e" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,570 C360,600 840,540 1200,570 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    합정 셔츠룸 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    합정 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#7c3aed" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    합정 합정 셔츠룸 추천정보 — 셔츠룸
  </text>
</svg>